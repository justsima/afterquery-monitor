name: AfterQuery Pluto Submissions Monitor

on:
  schedule:
    # Every hour, on the hour (UTC). GitHub may delay scheduled runs a few
    # minutes under load. To go faster, see the budget note in README.
    - cron: '0 * * * *'
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write          # so the job can commit the saved state back

concurrency:
  group: afterquery-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Chromium (if not cached)
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          AFTERQUERY_AUTH_B64: ${{ secrets.AFTERQUERY_AUTH_B64 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONITOR_SELECTOR: ${{ vars.MONITOR_SELECTOR }}
        run: node monitor.mjs

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug.png
          if-no-files-found: ignore
          retention-days: 3

      - name: Persist state + daily heartbeat
        if: always()
        run: |
          mkdir -p state
          date -u +%Y-%m-%d > state/heartbeat.txt   # one-commit-a-day keeps the cron alive
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add state/last.txt state/heartbeat.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "state update [skip ci]"
          git push || true
